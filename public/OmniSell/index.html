<!doctype html>
<html lang="vi">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniSell Project Dashboard</title>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .animate-in {
      animation: fadeIn 0.5s ease-out;
    }
    
    .slide-in {
      animation: slideIn 0.4s ease-out;
    }
    
    .progress-bar {
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .status-badge {
      transition: all 0.2s ease;
    }
    
    .tab-button {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .tab-button:hover {
      transform: translateY(-2px);
    }
    
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.15);
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
    }
    
    .group-badge {
      transition: all 0.2s ease;
    }
    
    .group-badge:hover {
      transform: scale(1.05);
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="bg-gray-50 min-h-screen">
  <div id="app" class="w-full h-full overflow-auto"></div>
  <script>
    const defaultConfig = {
      background_color: "#ffffff",
      surface_color: "#f8fafc",
      text_color: "#1e293b",
      primary_action: "#f59e0b",
      secondary_action: "#d97706",
      project_name: "OmniSell Project",
      project_id: "OSL",
      version: "2.2",
      release_date: "31/03/2026",
      iteration_goal: "Refactor cụm BE, tổ chức lại bộ KQTV chung, bổ sung check trùng đơn hàng Online, cung cấp API KHTN cho FoxOne, viết API báo cáo data phân phối cho SOP, auto tạo KHTN kênh Social, chuẩn hóa event schema & logging.",
      progress_label: "Tiến độ tổng thể",
      version_label: "Version",
      deadline_label: "Ngày Release",
      issues_label: "Vấn đề",
      font_family: "Space Grotesk",
      font_size: 16
    };

    let activeTab = 'dashboard';
    
    const projectData = {
      overallProgress: 15,
      totalTasks: 13,
      doneTasks: 2,
      mainTasks: [
        { title: "Nhận KHTN VIP 7 DKOL - GTEL PAY(BCA) (26/1-28/1)", status: "DONE", progress: "100%", group: "Backend" },
        { title: "Bổ sung check trùng đơn hàng Online (24/2-27/2)", status: "IN PROGRESS", progress: "60%", group: "Backend" },
        { title: "Tổ chức lại bộ KQTV chung giữa các kênh SOP-WSale-OmniSell (29/1-11/2)", status: "DONE", progress: "100%", group: "Backend" },
        { title: "Bổ sung API báo cáo data phân phối cho SOP và thêm TrackingId nhận biết chiến dịch (12/2-13/2)", status: "IN PROGRESS", progress: "0%", group: "Backend" },
        { title: "Cung cấp API KHTN cho FoxOne (23/2-4/3)", status: "IN PROGRESS", progress: "10%", group: "API" },
        { title: "Tiếp nhận KHTN từ SR ghi nhận vào SR nonSHD (KHTN) (4/3-17/3)", status: "IN PROGRESS", progress: "0%", group: "Database" },
        { title: "Thay đổi thông tin địa chỉ HCQG (18/3-31/3)", status: "IN PROGRESS", progress: "0%", group: "Database" },
        { title: "Refactor cụm BE (nghiệp vụ & kiến trúc)", status: "PENDING", progress: "0%", group: "Infrastructure" },
        { title: "Bổ sung mã màu + mess chi tiết theo template nhận KHTN", status: "PENDING", progress: "0%", group: "Marketing" },
        { title: "Custom lại phần lưu các utm cho MKT", status: "PENDING", progress: "0%", group: "Marketing" },
        { title: "Chuẩn hóa event schema & logging", status: "PENDING", progress: "0%", group: "Backend" },
        { title: "Auto tạo KHTN kênh Social: Zalo Mini app, Facebook", status: "PENDING", progress: "0%", group: "Integration" },
        { title: "Bổ sung check trùng Checklist tư vấn Telesales", status: "PENDING", progress: "0%", group: "Backend" }
      ],
      nextTwoWeeks: [
        { category: "Tuần 1 (23/2 - 27/2)", items: ["Tổ chức lại bộ KQTV chung: Tiếp tục phát triển logic xử lý", "Review & test các thay đổi KQTV", "Hỗ trợ bổ sung check trùng đơn hàng Online (Hot Request)"] },
        { category: "Tuần 2 (2/3 - 6/3)", items: ["Bổ sung ghi nhận TrackingID đơn hàng từ SOP, Bóng chat", "Viết API báo cáo data phân phối cho SOP", "Chuẩn bị kế hoạch chi tiết cho API KHTN FoxOne (deadline 4/3)"] }
      ],
      issues: [
        { title: "Resource dev chưa đáp ứng đủ với số lượng task hiện tại", desc: "Đội ngũ phát triển hiện tại chưa đủ nguồn lực để xử lý song song các task Backend, Integration, Database và Refactor BE. Cần bổ sung thêm developer hoặc điều chỉnh ưu tiên.", severity: "Medium", icon: "alert" }
      ]
    };

    const groupColors = {
      "Backend": { bg: "#3b82f620", color: "#3b82f6" },
      "API": { bg: "#ec489920", color: "#ec4899" },
      "Database": { bg: "#8b5cf620", color: "#8b5cf6" },
      "Infrastructure": { bg: "#6366f120", color: "#6366f1" },
      "Marketing": { bg: "#10b98120", color: "#10b981" },
      "Features": { bg: "#f59e0b20", color: "#f59e0b" },
      "Development": { bg: "#ec489920", color: "#ec4899" },
      "Integration": { bg: "#06b6d420", color: "#06b6d4" }
    };

    function renderApp(config) {
      const app = document.getElementById('app');
      const baseSize = config.font_size || defaultConfig.font_size;
      const fontFamily = config.font_family || defaultConfig.font_family;
      const baseFontStack = 'system-ui, -apple-system, sans-serif';
      
      app.innerHTML = `
        <div class="w-full h-full p-6" style="background: linear-gradient(135deg, ${config.background_color} 0%, ${config.surface_color} 100%); font-family: ${fontFamily}, ${baseFontStack}; height: 100%;">
          <!-- Header with Gradient -->
          <div class="mb-4 animate-in">
            <div class="p-4 rounded-2xl gradient-bg shadow-2xl">
              <div class="flex items-center justify-between mb-2">
                <h1 class="font-bold text-white" style="font-size: ${baseSize * 2}px;">${config.project_name}</h1>
                <div class="flex items-center space-x-3">
                  <span class="px-3 py-1 rounded-full text-sm font-bold bg-white bg-opacity-25 text-white backdrop-blur-sm" style="font-size: ${baseSize * 0.85}px;">v${config.version}</span>
                </div>
              </div>
              <p class="text-white text-opacity-90" style="font-size: ${baseSize * 0.9}px;">${config.release_date}</p>
            </div>
          </div>

          <!-- Navigation Tabs -->
          <div class="flex space-x-2 mb-4 p-2 rounded-2xl" style="background-color: ${config.surface_color};">
            <button id="tab-dashboard" class="tab-button px-4 py-2 rounded-xl font-bold flex items-center space-x-2" style="font-size: ${baseSize * 0.85}px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
              <span>Dashboard</span>
            </button>
            <button id="tab-tasks" class="tab-button px-4 py-2 rounded-xl font-bold flex items-center space-x-2" style="font-size: ${baseSize * 0.85}px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
              </svg>
              <span>Tasks</span>
            </button>
            <button id="tab-roadmap" class="tab-button px-4 py-2 rounded-xl font-bold flex items-center space-x-2" style="font-size: ${baseSize * 0.85}px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
              <span>Next Plan</span>
            </button>
            <button id="tab-issues" class="tab-button px-4 py-2 rounded-xl font-bold flex items-center space-x-2" style="font-size: ${baseSize * 0.85}px;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
              </svg>
              <span>Issues</span>
            </button>
          </div>

          <!-- Content Area -->
          <div id="content-area"></div>
        </div>
      `;

      updateTabStyles(config);
      renderContent(config);
      
      document.getElementById('tab-dashboard').addEventListener('click', () => switchTab('dashboard', config));
      document.getElementById('tab-tasks').addEventListener('click', () => switchTab('tasks', config));
      document.getElementById('tab-roadmap').addEventListener('click', () => switchTab('roadmap', config));
      document.getElementById('tab-issues').addEventListener('click', () => switchTab('issues', config));
    }

    function switchTab(tab, config) {
      activeTab = tab;
      updateTabStyles(config);
      renderContent(config);
    }

    function updateTabStyles(config) {
      const tabs = ['dashboard', 'tasks', 'roadmap', 'issues'];
      tabs.forEach(tab => {
        const button = document.getElementById(`tab-${tab}`);
        if (button) {
          if (tab === activeTab) {
            button.style.backgroundColor = config.primary_action;
            button.style.color = '#ffffff';
          } else {
            button.style.backgroundColor = 'transparent';
            button.style.color = config.text_color;
            button.style.opacity = '0.6';
          }
        }
      });
    }

    function renderContent(config) {
      const contentArea = document.getElementById('content-area');
      
      if (activeTab === 'dashboard') {
        contentArea.innerHTML = renderDashboard(config);
      } else if (activeTab === 'tasks') {
        contentArea.innerHTML = renderTasks(config);
      } else if (activeTab === 'roadmap') {
        contentArea.innerHTML = renderRoadmap(config);
      } else if (activeTab === 'issues') {
        contentArea.innerHTML = renderIssues(config);
      }
    }

    function renderDashboard(config) {
      const baseSize = config.font_size || defaultConfig.font_size;
      return `
        <div class="space-y-4 animate-in">
          <!-- Stats Cards -->
          <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
            <div class="card-hover p-3 rounded-xl shadow-xl border" style="background-color: ${config.surface_color}; border-color: ${config.primary_action}30;">
              <div class="flex items-center space-x-3">
                <div class="p-3 rounded-xl" style="background: linear-gradient(135deg, ${config.primary_action} 0%, ${config.secondary_action} 100%);">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                  </svg>
                </div>
                <div>
                  <p class="font-semibold mb-1" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.75}px;">${config.progress_label}</p>
                  <p class="font-bold" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">${projectData.overallProgress}%</p>
                </div>
              </div>
            </div>
            
            <div class="card-hover p-3 rounded-xl shadow-xl border" style="background-color: ${config.surface_color}; border-color: #10b98130;">
              <div class="flex items-center space-x-3">
                <div class="p-3 rounded-xl" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                  </svg>
                </div>
                <div>
                  <p class="font-semibold mb-1" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.75}px;">${config.version_label}</p>
                  <p class="font-bold" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">${config.version}</p>
                </div>
              </div>
            </div>
            
            <div class="card-hover p-3 rounded-xl shadow-xl border" style="background-color: ${config.surface_color}; border-color: ${config.primary_action}30;">
              <div class="flex items-center space-x-3">
                <div class="p-3 rounded-xl" style="background: linear-gradient(135deg, ${config.primary_action} 0%, ${config.secondary_action} 100%);">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                  </svg>
                </div>
                <div>
                  <p class="font-semibold mb-1" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.75}px;">${config.deadline_label}</p>
                  <p class="font-bold leading-tight" style="color: ${config.text_color}; font-size: ${baseSize * 0.9}px;">31/03/2026</p>
                </div>
              </div>
            </div>
            
            <div class="card-hover p-3 rounded-xl shadow-xl border" style="background-color: ${config.surface_color}; border-color: #10b98130;">
              <div class="flex items-center space-x-3">
                <div class="p-3 rounded-xl" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%);">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                  </svg>
                </div>
                <div>
                  <p class="font-semibold mb-1" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.8}px;">Status</p>
                  <p class="font-bold" style="color: #f59e0b; font-size: ${baseSize * 1.2}px;">On Track</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Progress Overview -->
          <div class="card-hover p-4 rounded-xl shadow-xl" style="background-color: ${config.surface_color};">
            <h2 class="font-bold mb-3" style="color: ${config.text_color}; font-size: ${baseSize * 1.2}px;">Tổng quan tiến độ Version 2.2</h2>
            <div class="space-y-3">
              <div class="flex justify-between items-center mb-2">
                <span class="font-semibold" style="color: ${config.text_color}; font-size: ${baseSize * 0.95}px;">Tiến độ hoàn thành</span>
                <span class="font-bold px-3 py-1 rounded-full" style="color: ${config.primary_action}; background-color: ${config.primary_action}20; font-size: ${baseSize * 1.1}px;">${projectData.overallProgress}%</span>
              </div>
              <div class="w-full rounded-full h-4 shadow-inner" style="background-color: ${config.background_color};">
                <div class="progress-bar h-4 rounded-full shadow-lg" style="width: ${projectData.overallProgress}%; background: linear-gradient(90deg, ${config.primary_action} 0%, ${config.secondary_action} 100%);"></div>
              </div>
              <div class="grid grid-cols-3 gap-3 mt-4 pt-3" style="border-top: 2px solid ${config.primary_action}30;">
                <div class="text-center p-3 rounded-xl" style="background-color: ${config.background_color};">
                  <p class="font-bold mb-1" style="color: #10b981; font-size: ${baseSize * 1.5}px;">${projectData.doneTasks}</p>
                  <p class="font-semibold" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.75}px;">Hoàn thành</p>
                </div>
                <div class="text-center p-3 rounded-xl" style="background-color: ${config.background_color};">
                  <p class="font-bold mb-1" style="color: #f59e0b; font-size: ${baseSize * 1.5}px;">${projectData.mainTasks.filter(t => t.status === 'IN PROGRESS').length}</p>
                  <p class="font-semibold" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.75}px;">Đang thực hiện</p>
                </div>
                <div class="text-center p-3 rounded-xl" style="background-color: ${config.background_color};">
                  <p class="font-bold mb-1" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">${projectData.totalTasks}</p>
                  <p class="font-semibold" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.75}px;">Tổng số</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Recent Activity Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-hover p-4 rounded-xl shadow-xl" style="background-color: ${config.surface_color};">
              <h3 class="font-bold mb-3 flex items-center space-x-2" style="color: ${config.text_color}; font-size: ${baseSize * 1.05}px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>Hoàn thành gần đây</span>
              </h3>
              <div class="space-y-2">
                ${projectData.mainTasks.filter(t => t.status === 'DONE').slice(-3).map(task => `
                  <div class="slide-in flex items-start space-x-2 p-3 rounded-xl" style="background-color: ${config.background_color};">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" class="flex-shrink-0 mt-0.5">
                      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                      <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <div class="flex-1">
                      <p class="font-medium mb-1" style="color: ${config.text_color}; font-size: ${baseSize * 0.85}px; line-height: 1.4;">${task.title}</p>
                      <div class="flex items-center space-x-2 mt-2">
                        <span class="group-badge px-2 py-1 rounded-full text-xs font-bold" style="background-color: ${groupColors[task.group].bg}; color: ${groupColors[task.group].color}; font-size: ${baseSize * 0.65}px;">${task.group}</span>
                        <span class="px-2 py-1 rounded-full text-xs font-bold" style="background-color: ${config.primary_action}20; color: ${config.primary_action};">${task.progress}</span>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="card-hover p-4 rounded-xl shadow-xl" style="background-color: ${config.surface_color};">
              <h3 class="font-bold mb-3 flex items-center space-x-2" style="color: ${config.text_color}; font-size: ${baseSize * 1.05}px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>Đang thực hiện</span>
              </h3>
              <div class="space-y-2">
                ${projectData.mainTasks.filter(t => t.status === 'IN PROGRESS').map(task => `
                  <div class="slide-in flex items-start space-x-2 p-3 rounded-xl" style="background-color: ${config.background_color};">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" class="flex-shrink-0 mt-0.5">
                      <circle cx="12" cy="12" r="10"></circle>
                      <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <div class="flex-1">
                      <p class="font-medium mb-1" style="color: ${config.text_color}; font-size: ${baseSize * 0.85}px; line-height: 1.4;">${task.title}</p>
                      <div class="flex items-center space-x-2 mt-2">
                        <span class="group-badge px-2 py-1 rounded-full text-xs font-bold" style="background-color: ${groupColors[task.group].bg}; color: ${groupColors[task.group].color}; font-size: ${baseSize * 0.65}px;">${task.group}</span>
                        <span class="px-2 py-1 rounded-full text-xs font-bold" style="background-color: ${config.primary_action}20; color: ${config.primary_action};">${task.progress}</span>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderTasks(config) {
      const baseSize = config.font_size || defaultConfig.font_size;
      return `
        <div class="space-y-6 animate-in">
          <div class="card-hover p-8 rounded-2xl shadow-xl" style="background-color: ${config.surface_color};">
            <h2 class="font-bold mb-8" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">Danh sách nhiệm vụ - Version 2.2</h2>
            <div class="space-y-4">
              ${projectData.mainTasks.map((task, index) => {
                const isDone = task.status === 'DONE';
                const statusColor = isDone ? '#10b981' : (task.status === 'IN PROGRESS' ? '#f59e0b' : '#6b7280');
                const statusBg = isDone ? '#10b98130' : (task.status === 'IN PROGRESS' ? '#f59e0b30' : '#6b728030');
                const statusIcon = isDone ? `
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${statusColor}" stroke-width="2.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                  </svg>
                ` : `
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${statusColor}" stroke-width="2.5">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                  </svg>
                `;
                
                return `
                  <div class="flex items-center justify-between p-5 rounded-xl border-2 card-hover" style="background-color: ${config.background_color}; border-color: ${groupColors[task.group].color}40;">
                    <div class="flex items-center space-x-5 flex-1">
                      <span class="font-bold text-center rounded-lg px-3 py-2" style="color: ${config.text_color}; background-color: ${config.surface_color}; font-size: ${baseSize * 0.9}px; min-width: 40px;">#${index + 1}</span>
                      <div class="flex-1">
                        <p class="font-semibold mb-2" style="color: ${config.text_color}; font-size: ${baseSize * 1.05}px; line-height: 1.5;">${task.title}</p>
                        <div class="flex items-center space-x-2 mt-2">
                          <span class="group-badge px-3 py-1 rounded-full text-xs font-bold" style="background-color: ${groupColors[task.group].bg}; color: ${groupColors[task.group].color};">${task.group}</span>
                          <span class="px-3 py-1 rounded-full text-xs font-bold" style="background-color: ${config.primary_action}20; color: ${config.primary_action};">${task.progress}</span>
                        </div>
                      </div>
                    </div>
                    <div class="flex items-center space-x-3">
                      <span class="status-badge px-4 py-2 rounded-xl font-bold flex items-center space-x-2 shadow-lg" style="background-color: ${statusBg}; color: ${statusColor}; font-size: ${baseSize * 0.85}px;">
                        ${statusIcon}
                        <span>${task.status}</span>
                      </span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderRoadmap(config) {
      const baseSize = config.font_size || defaultConfig.font_size;
      const categoryColors = [
        { bg: '#f59e0b20', color: '#f59e0b' },
        { bg: '#3b82f620', color: '#3b82f6' }
      ];
      
      return `
        <div class="space-y-6 animate-in">
          <div class="card-hover p-8 rounded-2xl shadow-xl" style="background-color: ${config.surface_color};">
            <h2 class="font-bold mb-8 flex items-center space-x-3" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${config.primary_action}" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 10"></polyline>
              </svg>
              <span>Next Plan</span>
            </h2>
            <div class="space-y-8">
              ${projectData.nextTwoWeeks.map((category, idx) => `
                <div class="slide-in">
                  <div class="flex items-center space-x-4 mb-5 p-4 rounded-xl" style="background-color: ${categoryColors[idx].bg};">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${categoryColors[idx].color}" stroke-width="2.5">
                      <circle cx="12" cy="12" r="10"></circle>
                      <polyline points="12 6 12 12 16 10"></polyline>
                    </svg>
                    <h3 class="font-bold" style="color: ${categoryColors[idx].color}; font-size: ${baseSize * 1.25}px;">${category.category}</h3>
                  </div>
                  <div class="space-y-3 ml-6">
                    ${category.items.map(item => `
                      <div class="flex items-start space-x-4 p-4 rounded-xl card-hover" style="background-color: ${config.background_color}; border-left: 4px solid ${categoryColors[idx].color};">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${categoryColors[idx].color}" stroke-width="2.5" class="flex-shrink-0 mt-1"><polyline points="9 11 12 14 22 4"></polyline></svg>
                        <p class="font-medium" style="color: ${config.text_color}; font-size: ${baseSize * 0.95}px; line-height: 1.6;">${item}</p>
                      </div>
                    `).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderIssues(config) {
      const baseSize = config.font_size || defaultConfig.font_size;
      return `
        <div class="space-y-6 animate-in">
          <div class="card-hover p-8 rounded-2xl shadow-xl" style="background-color: ${config.surface_color};">
            <h2 class="font-bold mb-8 flex items-center space-x-3" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${config.primary_action}" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
              </svg>
              <span>${config.issues_label || defaultConfig.issues_label}</span>
            </h2>
            <div class="space-y-5">
              ${projectData.issues.map(issue => {
                let severityColor, severityBg, icon;
                
                if (issue.severity === 'High') {
                  severityColor = '#ef4444';
                  severityBg = '#ef444420';
                  icon = `
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${severityColor}" stroke-width="2.5">
                      <circle cx="12" cy="12" r="10"></circle>
                      <line x1="12" y1="8" x2="12" y2="12"></line>
                      <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                  `;
                } else if (issue.severity === 'Medium') {
                  severityColor = '#f59e0b';
                  severityBg = '#f59e0b20';
                  icon = `
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${severityColor}" stroke-width="2.5">
                      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                      <line x1="12" y1="9" x2="12" y2="13"></line>
                      <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                  `;
                } else {
                  severityColor = '#10b981';
                  severityBg = '#10b98130';
                  icon = `
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${severityColor}" stroke-width="2.5">
                      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                      <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                  `;
                }
                
                return `
                  <div class="p-6 rounded-2xl border-2 card-hover" style="background-color: ${config.background_color}; border-color: ${severityColor};">
                    <div class="flex items-start justify-between mb-4">
                      <div class="flex items-start space-x-4 flex-1">
                        <div class="p-3 rounded-xl" style="background-color: ${severityBg};">
                          ${icon}
                        </div>
                        <div class="flex-1">
                          <h3 class="font-bold mb-3" style="color: ${config.text_color}; font-size: ${baseSize * 1.15}px;">${issue.title}</h3>
                          <p class="leading-relaxed" style="color: ${config.text_color}; opacity: 0.8; font-size: ${baseSize * 0.95}px; line-height: 1.7;">${issue.desc}</p>
                        </div>
                      </div>
                      <span class="px-4 py-2 rounded-xl font-bold ml-4 shadow-lg flex-shrink-0" style="background-color: ${severityBg}; color: ${severityColor}; font-size: ${baseSize * 0.85}px;">${issue.severity}</span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    async function onConfigChange(config) {
      renderApp(config);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => {
                config.background_color = value;
                window.elementSdk.setConfig({ background_color: value });
              }
            },
            {
              get: () => config.surface_color || defaultConfig.surface_color,
              set: (value) => {
                config.surface_color = value;
                window.elementSdk.setConfig({ surface_color: value });
              }
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => {
                config.text_color = value;
                window.elementSdk.setConfig({ text_color: value });
              }
            },
            {
              get: () => config.primary_action || defaultConfig.primary_action,
              set: (value) => {
                config.primary_action = value;
                window.elementSdk.setConfig({ primary_action: value });
              }
            },
            {
              get: () => config.secondary_action || defaultConfig.secondary_action,
              set: (value) => {
                config.secondary_action = value;
                window.elementSdk.setConfig({ secondary_action: value });
              }
            }
          ],
          borderables: [],
          fontEditable: {
            get: () => config.font_family || defaultConfig.font_family,
            set: (value) => {
              config.font_family = value;
              window.elementSdk.setConfig({ font_family: value });
            }
          },
          fontSizeable: {
            get: () => config.font_size || defaultConfig.font_size,
            set: (value) => {
              config.font_size = value;
              window.elementSdk.setConfig({ font_size: value });
            }
          }
        }),
        mapToEditPanelValues: (config) => new Map([
          ["project_name", config.project_name || defaultConfig.project_name],
          ["project_id", config.project_id || defaultConfig.project_id],
          ["version", config.version || defaultConfig.version],
          ["release_date", config.release_date || defaultConfig.release_date],
          ["iteration_goal", config.iteration_goal || defaultConfig.iteration_goal],
          ["progress_label", config.progress_label || defaultConfig.progress_label],
          ["version_label", config.version_label || defaultConfig.version_label],
          ["deadline_label", config.deadline_label || defaultConfig.deadline_label],
          ["issues_label", config.issues_label || defaultConfig.issues_label]
        ])
      });
    }

    window.addEventListener('DOMContentLoaded', () => {
      if (window.elementSdk && window.elementSdk.config) {
        renderApp(window.elementSdk.config);
      } else {
        renderApp(defaultConfig);
      }
    });
  </script>
 </body>
</html>
