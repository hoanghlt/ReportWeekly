<!doctype html>
<html lang="vi">

  <meta charset="UTF-8">

  <title>FCP Project Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      box-sizing: border-box;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .animate-in {
      animation: fadeIn 0.5s ease-out;
    }
    
    .slide-in {
      animation: slideIn 0.4s ease-out;
    }
    
    .progress-bar {
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .status-badge {
      transition: all 0.2s ease;
    }
    
    .tab-button {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .tab-button:hover {
      transform: translateY(-2px);
    }
    
    .card-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(99, 102, 241, 0.15);
    }
    
    .gradient-bg {
      background: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
    }
    
    .group-badge {
      transition: all 0.2s ease;
    }
    
    .group-badge:hover {
      transform: scale(1.05);
    }
  </style>
 </head>

    function updateTabStyles(config) {
      const tabs = ['dashboard', 'tasks', 'roadmap', 'issues'];

            button.style.backgroundColor = config.primary_action;
            button.style.color = '#ffffff';
          } else {
            button.style.backgroundColor = 'transparent';
            button.style.color = config.text_color;
            button.style.opacity = '0.6';
          }
        }
      });
    }

                <div class="text-center p-3 rounded-xl" style="background-color: ${config.background_color};">
                  <p class="font-bold mb-1" style="color: #f59e0b; font-size: ${baseSize * 1.5}px;">${projectData.mainTasks.filter(t => t.status === 'IN PROGRESS').length}</p>
                  <p class="font-semibold" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.75}px;">Đang thực hiện</p>
                </div>
                <div class="text-center p-3 rounded-xl" style="background-color: ${config.background_color};">
                  <p class="font-bold mb-1" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">${projectData.totalTasks}</p>
                  <p class="font-semibold" style="color: ${config.text_color}; opacity: 0.7; font-size: ${baseSize * 0.75}px;">Tổng số</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Recent Activity Grid -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="card-hover p-4 rounded-xl shadow-xl" style="background-color: ${config.surface_color};">
              <h3 class="font-bold mb-3 flex items-center space-x-2" style="color: ${config.text_color}; font-size: ${baseSize * 1.05}px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                  <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                <span>Hoàn thành</span>
              </h3>
              <div class="space-y-2">
                ${projectData.mainTasks.filter(t => t.status === 'DONE').map(task => `
                  <div class="slide-in flex items-start space-x-2 p-3 rounded-xl" style="background-color: ${config.background_color};">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" class="flex-shrink-0 mt-0.5">
                      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                      <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <div class="flex-1">
                      <p class="font-medium mb-1" style="color: ${config.text_color}; font-size: ${baseSize * 0.85}px; line-height: 1.4;">${task.title}</p>
                      <div class="flex items-center space-x-2 mt-2">
                        <span class="group-badge px-2 py-1 rounded-full text-xs font-bold" style="background-color: ${groupColors[task.group].bg}; color: ${groupColors[task.group].color}; font-size: ${baseSize * 0.65}px;">${task.group}</span>
                        <span class="px-2 py-1 rounded-full text-xs font-bold" style="background-color: ${config.primary_action}20; color: ${config.primary_action};">${task.progress}</span>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="card-hover p-4 rounded-xl shadow-xl" style="background-color: ${config.surface_color};">
              <h3 class="font-bold mb-3 flex items-center space-x-2" style="color: ${config.text_color}; font-size: ${baseSize * 1.05}px;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>Đang thực hiện</span>
              </h3>
              <div class="space-y-2">
                ${projectData.mainTasks.filter(t => t.status === 'IN PROGRESS').slice(0, 3).map(task => `
                  <div class="slide-in flex items-start space-x-2 p-3 rounded-xl" style="background-color: ${config.background_color};">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2.5" class="flex-shrink-0 mt-0.5">
                      <circle cx="12" cy="12" r="10"></circle>
                      <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <div class="flex-1">
                      <p class="font-medium mb-1" style="color: ${config.text_color}; font-size: ${baseSize * 0.85}px; line-height: 1.4;">${task.title}</p>
                      <div class="flex items-center space-x-2 mt-2">
                        <span class="group-badge px-2 py-1 rounded-full text-xs font-bold" style="background-color: ${groupColors[task.group].bg}; color: ${groupColors[task.group].color}; font-size: ${baseSize * 0.65}px;">${task.group}</span>
                        <span class="px-2 py-1 rounded-full text-xs font-bold" style="background-color: ${config.primary_action}20; color: ${config.primary_action};">${task.progress}</span>
                      </div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderTasks(config) {
      const baseSize = config.font_size || defaultConfig.font_size;
      
      // Group tasks by sprint
      const sprintGroups = {};
      const sprintOrder = ['Sprint 4 - S1', 'Sprint 5 - S2', 'Sprint 6 - S3', 'Triển khai production', 'Tích hợp Fox-ERP'];
      
      projectData.mainTasks.forEach((task, index) => {
        let sprint = 'Khác';
        if (task.title.includes('Sprint 4')) sprint = 'Sprint 4 - S1';
        else if (task.title.includes('Sprint 5')) sprint = 'Sprint 5 - S2';
        else if (task.title.includes('Sprint 6')) sprint = 'Sprint 6 - S3';
        else if (task.title.includes('Triển khai')) sprint = 'Triển khai production';
        else if (task.title.includes('Tích hợp')) sprint = 'Tích hợp Fox-ERP';
        
        if (!sprintGroups[sprint]) {
          sprintGroups[sprint] = [];
        }
        sprintGroups[sprint].push({ ...task, originalIndex: index + 1 });
      });
      
      const sprintColors = {
        'Sprint 4 - S1': { bg: '#3b82f620', color: '#3b82f6', icon: '🔧' },
        'Sprint 5 - S2': { bg: '#ec489920', color: '#ec4899', icon: '🛒' },
        'Sprint 6 - S3': { bg: '#06b6d420', color: '#06b6d4', icon: '🏠' },
        'Triển khai production': { bg: '#f59e0b20', color: '#f59e0b', icon: '🚀' },
        'Tích hợp Fox-ERP': { bg: '#6366f120', color: '#6366f1', icon: '🔗' }
      };
      
      let html = '<div class="space-y-6 animate-in"><div class="card-hover p-8 rounded-2xl shadow-xl" style="background-color: ' + config.surface_color + ';">';
      html += '<h2 class="font-bold mb-8" style="color: ' + config.text_color + '; font-size: ' + (baseSize * 1.5) + 'px;">Danh sách nhiệm vụ - Grouped by Sprint</h2>';
      html += '<div class="space-y-8">';
      
      sprintOrder.forEach(sprint => {
        if (!sprintGroups[sprint] || sprintGroups[sprint].length === 0) return;
        
        const sprintColor = sprintColors[sprint];
        const tasks = sprintGroups[sprint];
        
        html += '<div class="slide-in">';
        html += '<div class="flex items-center space-x-3 mb-5 p-4 rounded-xl" style="background-color: ' + sprintColor.bg + ';">';
        html += '<span style="font-size: 24px;">' + sprintColor.icon + '</span>';
        html += '<h3 class="font-bold" style="color: ' + sprintColor.color + '; font-size: ' + (baseSize * 1.25) + 'px;">' + sprint + '</h3>';
        html += '</div>';
        
        html += '<div class="space-y-3 ml-2">';
        tasks.forEach(task => {
          const isDone = task.status === 'DONE';
          const statusColor = isDone ? '#10b981' : (task.status === 'IN PROGRESS' ? '#f59e0b' : '#6b7280');
          
          html += '<div class="flex items-center justify-between p-5 rounded-xl border-2 card-hover" style="background-color: ' + config.background_color + '; border-color: ' + groupColors[task.group].color + '40; border-left: 4px solid ' + groupColors[task.group].color + ';">';
          html += '<div class="flex items-center space-x-5 flex-1">';
          html += '<span class="font-bold text-center rounded-lg px-3 py-2" style="color: ' + config.text_color + '; background-color: ' + config.surface_color + '; font-size: ' + (baseSize * 0.9) + 'px; min-width: 40px;">#' + task.originalIndex + '</span>';
          html += '<div class="flex-1">';
          html += '<p class="font-semibold mb-2" style="color: ' + config.text_color + '; font-size: ' + (baseSize * 1.05) + 'px; line-height: 1.5;">' + task.title + '</p>';
          html += '<div class="flex items-center space-x-2 mt-2">';
          html += '<span class="group-badge px-3 py-1 rounded-full text-xs font-bold" style="background-color: ' + groupColors[task.group].bg + '; color: ' + groupColors[task.group].color + ';">' + task.group + '</span>';
          html += '<span class="px-3 py-1 rounded-full text-xs font-bold" style="background-color: ' + config.primary_action + '20; color: ' + config.primary_action + ';">' + task.progress + '</span>';
          html += '</div>';
          html += '</div>';
          html += '</div>';
          html += '<span class="status-badge px-4 py-2 rounded-xl font-bold flex items-center space-x-2 shadow-lg" style="background-color: ' + statusColor + '30; color: ' + statusColor + '; font-size: ' + (baseSize * 0.85) + 'px;">' + task.status + '</span>';
          html += '</div>';
        });
        html += '</div>';
        html += '</div>';
      });
      
      html += '</div></div></div>';
      return html;
    }

    function renderRoadmap(config) {
      const baseSize = config.font_size || defaultConfig.font_size;
      const categoryColors = [
        { bg: '#06b6d420', color: '#06b6d4' },
        { bg: '#8b5cf620', color: '#8b5cf6' }
      ];
      
      return `
        <div class="space-y-6 animate-in">
          <div class="card-hover p-8 rounded-2xl shadow-xl" style="background-color: ${config.surface_color};">
            <h2 class="font-bold mb-8 flex items-center space-x-3" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${config.primary_action}" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 10"></polyline>
              </svg>
              <span>Roadmap</span>
            </h2>
            <div class="space-y-8">
              ${projectData.nextTwoWeeks.map((category, idx) => `
                <div class="slide-in">
                  <div class="flex items-center space-x-4 mb-5 p-4 rounded-xl" style="background-color: ${categoryColors[idx].bg};">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${categoryColors[idx].color}" stroke-width="2.5">
                      <circle cx="12" cy="12" r="10"></circle>
                      <polyline points="12 6 12 12 16 10"></polyline>
                    </svg>
                    <h3 class="font-bold" style="color: ${categoryColors[idx].color}; font-size: ${baseSize * 1.25}px;">${category.category}</h3>
                  </div>
                  <div class="space-y-3 ml-6">
                    ${category.items.map(item => `
                      <div class="flex items-start space-x-4 p-4 rounded-xl card-hover" style="background-color: ${config.background_color}; border-left: 4px solid ${categoryColors[idx].color};">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${categoryColors[idx].color}" stroke-width="2.5" class="flex-shrink-0 mt-1"><polyline points="9 11 12 14 22 4"></polyline></svg>
                        <p class="font-medium" style="color: ${config.text_color}; font-size: ${baseSize * 0.95}px; line-height: 1.6;">${item}</p>
                      </div>
                    `).join('')}
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderIssues(config) {
      const baseSize = config.font_size || defaultConfig.font_size;
      return `
        <div class="space-y-6 animate-in">
          <div class="card-hover p-8 rounded-2xl shadow-xl" style="background-color: ${config.surface_color};">
            <h2 class="font-bold mb-8 flex items-center space-x-3" style="color: ${config.text_color}; font-size: ${baseSize * 1.5}px;">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="${config.primary_action}" stroke-width="2">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
              </svg>
              <span>${config.issues_label || defaultConfig.issues_label}</span>
            </h2>
            <div class="space-y-5">
              ${projectData.issues.map(issue => {
                let severityColor, severityBg;
                if (issue.severity === 'High') {
                  severityColor = '#ef4444';
                  severityBg = '#ef444420';
                } else if (issue.severity === 'Medium') {
                  severityColor = '#f59e0b';
                  severityBg = '#f59e0b20';
                } else {
                  severityColor = '#10b981';
                  severityBg = '#10b98130';
                }
                return `
                  <div class="p-6 rounded-2xl border-2 card-hover" style="background-color: ${config.background_color}; border-color: ${severityColor};">
                    <div class="flex items-start justify-between mb-4">
                      <div class="flex items-start space-x-4 flex-1">
                        <div class="p-3 rounded-xl" style="background-color: ${severityBg};"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="${severityColor}" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg></div>
                        <div class="flex-1">
                          <h3 class="font-bold mb-3" style="color: ${config.text_color}; font-size: ${baseSize * 1.15}px;">${issue.title}</h3>
                          <p class="leading-relaxed" style="color: ${config.text_color}; opacity: 0.8; font-size: ${baseSize * 0.95}px; line-height: 1.7;">${issue.desc}</p>
                        </div>
                      </div>
                      <span class="px-4 py-2 rounded-xl font-bold ml-4 shadow-lg flex-shrink-0" style="background-color: ${severityBg}; color: ${severityColor}; font-size: ${baseSize * 0.85}px;">${issue.severity}</span>
                    </div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        </div>
      `;
    }

    window.addEventListener('DOMContentLoaded', () => {
      renderApp(defaultConfig);
    });
  </script>
 </body>
</html>
